<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishXplain | SOC Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="glow-bg"></div>
    
    <main class="container">
        <header class="header">
            <div class="logo">
                <div class="shield-icon">🛡️</div>
                <h1>Phish<span>Xplain</span></h1>
            </div>
            <p class="subtitle">Next-Generation Explainable Phishing Detection</p>
        </header>

        <section class="scanner-card glass-panel">
            <h2>URL Scanner</h2>
            <form id="scan-form">
                <div class="input-group">
                    <input type="url" id="url-input" placeholder="https://suspicious-domain.com/login" required autocomplete="off">
                    <button type="submit" id="scan-btn">
                        <span class="btn-text">Analyze URL</span>
                        <div class="spinner hidden"></div>
                    </button>
                </div>
            </form>
        </section>

        <section id="results-panel" class="results-grid hidden">
            <!-- Verdict Card -->
            <div class="result-card glass-panel verdict-container">
                <h3>Prediction Verdict</h3>
                <div class="verdict-display" id="verdict-display">
                    <div class="probability-ring">
                        <svg viewBox="0 0 36 36" class="circular-chart">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="circle" id="prob-circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <text x="18" y="20.35" class="percentage" id="prob-text">0%</text>
                        </svg>
                    </div>
                    <div class="verdict-text">
                        <h2 id="verdict-status">Analyzing...</h2>
                        <p class="latency">Latency: <span id="latency-val">--</span> ms</p>
                    </div>
                </div>
            </div>

            <!-- XAI Card -->
            <div class="result-card glass-panel xai-container">
                <h3>SHAP Explainability <span class="badge">XAI</span></h3>
                <p class="xai-desc">Feature contributions driving the probability score.</p>
                <div class="chart-wrapper">
                    <canvas id="shapChart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
